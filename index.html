<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#121212"/>
  <title>Вопрос/Ответ</title>
  
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.basic.min.js"></script>
  
  <style>
    :root {
      --bg-body: #0f0f0f;
      --bg-sidebar: #161616;
      --bg-card: #1e1e1e;
      --bg-card-hover: #252525;
      --bg-element: #2a2a2a;
      --bg-search: #1a1a1a;
      --bg-code: #1a1a2e;
      --bg-table: #1a1a1a;
      
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      
      --accent: #4caf50;
      --accent-hover: #66bb6a;
      --accent-soft: rgba(76, 175, 80, 0.15);
      --border: #333333;
      --border-light: #444444;
      
      --code-comment: #6a9955;
      --code-keyword: #569cd6;
      --code-string: #ce9178;
      --code-function: #dcdcaa;
      --code-number: #b5cea8;
      
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      font-size: 16px;
      line-height: 1.6;
    }

    .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
    .icon-lg { width: 28px; height: 28px; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    
    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      font-weight: 700;
      font-size: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    
    .sidebar-header .logo-icon { color: var(--accent); }
    
    .nav-section { margin-bottom: 24px; }
    
    .nav-title {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1.2px;
      margin-bottom: 12px;
      font-weight: 700;
      padding: 0 12px;
    }
    
    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      font-size: 14px;
      margin-bottom: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    
    .nav-link:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }
    
    .nav-link.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
    }
    
    .category-list { max-height: 300px; overflow-y: auto; }
    
    .category-item {
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .category-item:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }
    
    .category-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-left: 3px solid var(--accent);
      padding-left: 9px;
    }
    
    .category-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-element);
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .category-item.active .category-count {
      background: var(--accent);
      color: white;
    }

    /* ===== MOBILE MENU ===== */
    .menu-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 200;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    
    .menu-toggle.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ===== MAIN AREA ===== */
    .main-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 32px;
      scroll-behavior: smooth;
      position: relative;
    }
    
    .main-area::-webkit-scrollbar { width: 8px; }
    .main-area::-webkit-scrollbar-track { background: transparent; }
    .main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .main-area::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ===== HEADER + SEARCH ===== */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .header-title h2 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .header-title p {
      color: var(--text-muted);
      font-size: 14px;
    }
    
    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 520px;
      flex: 1;
      min-width: 240px;
    }
    
    .search-input {
      width: 100%;
      background: var(--bg-search);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px 14px 48px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: var(--transition);
    }
    
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    
    .search-icon-pos {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    
    .search-shortcut {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-element);
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    /* ===== SEARCH RESULTS ===== */
    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 60vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      z-index: 150;
      display: none;
    }
    
    .search-results.show { display: block; animation: slideDown 0.2s ease; }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: none; }
    }
    
    .result-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
    }
    
    .result-item:last-child { border-bottom: none; }
    
    .result-item:hover, .result-item.active {
      background: var(--bg-element);
    }
    
    .result-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .result-title mark {
      background: rgba(255, 193, 7, 0.3);
      color: #ffd54f;
      padding: 0 4px;
      border-radius: 3px;
      font-weight: 700;
    }
    
    .result-meta {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .result-category {
      display: inline-flex;
      align-items: center;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== CONTENT GRID ===== */
    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin: 32px 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .section-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 24px;
      background: var(--accent);
      border-radius: 2px;
    }
    
    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ===== CARD ===== */
    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }
    
    .article-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }
    
    .article-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }
    
    .article-card:hover::before {
      transform: scaleX(1);
    }
    
    .article-card:active {
      transform: scale(0.98);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    
    .card-title {
      font-weight: 600;
      font-size: 17px;
      line-height: 1.4;
      flex: 1;
    }
    
    .card-category {
      font-size: 11px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    
    .card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ===== PAGE VIEW ===== */
    .page-view { display: none; animation: fadeIn 0.3s ease; }
    .page-view.active { display: block; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }
    
    .page-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    
    .page-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    
    .page-meta {
      display: flex;
      gap: 16px;
      font-size: 14px;
      color: var(--text-muted);
      flex-wrap: wrap;
      align-items: center;
    }
    
    .page-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .page-actions {
      display: flex;
      gap: 12px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    
    .btn {
      background: var(--bg-element);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-light);
    }
    
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
    }

    /* ===== MARKDOWN CONTENT — ПОЛНЫЙ РЕДИЗАЙН ===== */
    .markdown-body {
      font-size: 17px;
      line-height: 1.8;
      color: var(--text-primary);
    }
    
    .markdown-body h1 {
      font-size: 28px;
      margin: 32px 0 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      font-weight: 700;
    }
    
    .markdown-body h2 {
      font-size: 24px;
      margin: 28px 0 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      font-weight: 700;
    }
    
    .markdown-body h3 {
      font-size: 20px;
      margin: 24px 0 12px;
      font-weight: 600;
    }
    
    .markdown-body h4 {
      font-size: 18px;
      margin: 20px 0 10px;
      font-weight: 600;
    }
    
    .markdown-body p {
      margin: 16px 0;
    }
    
    .markdown-body strong {
      color: var(--text-primary);
      font-weight: 700;
    }
    
    .markdown-body em {
      color: var(--text-secondary);
      font-style: italic;
    }
    
    .markdown-body code {
      background: var(--bg-code);
      color: #f8f8f2;
      padding: 3px 8px;
      border-radius: 6px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.9em;
      border: 1px solid var(--border);
    }
    
    .markdown-body pre {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      overflow-x: auto;
      margin: 20px 0;
      position: relative;
    }
    
    .markdown-body pre code {
      background: none;
      padding: 0;
      border: none;
      color: #f8f8f2;
      font-size: 14px;
      line-height: 1.6;
    }
    
    /* ===== ТАБЛИЦЫ — НОВЫЙ ДИЗАЙН ===== */
    .markdown-body table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 24px 0;
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      overflow: hidden;
    }
    
    .markdown-body th {
      background: var(--bg-element);
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
      padding: 14px 16px;
      text-align: left;
      border-bottom: 2px solid var(--border-light);
    }
    
    .markdown-body td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    
    .markdown-body tr:last-child td {
      border-bottom: none;
    }
    
    .markdown-body tr:hover td {
      background: var(--bg-card);
      color: var(--text-primary);
    }
    
    /* ===== СПИСКИ ===== */
    .markdown-body ul,
    .markdown-body ol {
      padding-left: 28px;
      margin: 16px 0;
    }
    
    .markdown-body li {
      margin: 10px 0;
      position: relative;
    }
    
    .markdown-body ul li::marker {
      color: var(--accent);
      font-size: 1.2em;
    }
    
    .markdown-body ol li::marker {
      color: var(--accent);
      font-weight: 600;
    }
    
    .markdown-body li > ul,
    .markdown-body li > ol {
      margin: 8px 0;
    }
    
    /* ===== ЦИТАТЫ ===== */
    .markdown-body blockquote {
      margin: 20px 0;
      padding: 16px 20px;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--text-secondary);
    }
    
    .markdown-body blockquote p {
      margin: 0;
    }
    
    /* ===== ССЫЛКИ ===== */
    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dashed var(--accent);
      transition: var(--transition);
      word-break: break-word;
    }
    
    .markdown-body a:hover {
      color: var(--accent-hover);
      border-bottom-style: solid;
      background: var(--accent-soft);
      padding: 0 4px;
      border-radius: 4px;
    }
    
    /* ===== ИЗОБРАЖЕНИЯ ===== */
    .markdown-body img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 20px 0;
      border: 1px solid var(--border);
      cursor: zoom-in;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }
    
    .markdown-body img:hover {
      box-shadow: var(--shadow);
      transform: scale(1.01);
    }
    
    /* ===== ГОРИЗОНТАЛЬНАЯ ЛИНИЯ ===== */
    .markdown-body hr {
      border: none;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 32px 0;
    }

    /* ===== IMAGE MODAL ===== */
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }
    
    .image-modal.active {
      display: flex;
    }
    
    .image-modal img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: var(--radius);
      transform-origin: center center;
      transition: transform 0.1s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    
    .modal-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
      z-index: 1001;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    
    .modal-close:hover {
      opacity: 1;
      background: rgba(255,255,255,0.2);
    }
    
    .modal-zoom-info {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 20px;
      pointer-events: none;
    }

    /* ===== EMPTY / LOADING ===== */
    .loading, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    /* ===== TOAST ===== */
    .copy-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent);
      color: white;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-weight: 600;
      box-shadow: var(--shadow);
      z-index: 1000;
      transition: transform 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .copy-toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        width: 300px;
        z-index: 180;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        box-shadow: var(--shadow);
      }
      
      .sidebar.open { transform: translateX(0); }
      
      .menu-toggle { display: flex; }
      
      .main-area { padding: 80px 20px 20px; }
      
      .header-bar { flex-direction: column; align-items: stretch; }
      
      .search-wrapper { max-width: 100%; }
      
      .content-grid { grid-template-columns: 1fr; }
      
      .page-title { font-size: 26px; }
      
      .markdown-body { font-size: 16px; }
      
      .markdown-body h1 { font-size: 24px; }
      .markdown-body h2 { font-size: 21px; }
      
      .markdown-body table { font-size: 14px; }
      .markdown-body th, .markdown-body td { padding: 10px 12px; }
    }
    
    @media (max-width: 480px) {
      .page-actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
      
      .markdown-body pre { padding: 14px; font-size: 12px; }
      .markdown-body code { font-size: 12px; }
    }

    .hidden { display: none !important; }
    .text-accent { color: var(--accent); }
    .text-muted { color: var(--text-muted); }
  </style>
</head>
<body>

  <!-- MOBILE MENU -->
  <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
    <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
  </button>

  <!-- APP CONTAINER -->
  <div id="app-container" style="display:flex;height:100vh;opacity:1;">
    
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg class="icon icon-lg logo-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Вопрос/Ответ
      </div>
      
      <div class="nav-section">
        <div class="nav-title">Навигация</div>
        <div class="nav-link active" id="navAll" onclick="showList(); setActiveNav('all')">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Все вопросы
        </div>
      </div>
      
      <div class="nav-section">
        <div class="nav-title">Категории</div>
        <div class="category-list" id="categoryList"></div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-area" id="mainArea" onclick="closeSidebarOnOutsideClick(event)">
      
      <!-- HEADER -->
      <header class="header-bar">
        <div class="header-title">
          <h2 id="headerTitle">Все вопросы</h2>
          <p id="headerSub">Найдено: <span id="countBadge">0</span></p>
        </div>
        <div class="search-wrapper">
          <svg class="icon search-icon-pos" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Поиск по вопросам и ответам..." autocomplete="off">
          <span class="search-shortcut">Ctrl+K</span>
          <div class="search-results" id="searchResults"></div>
        </div>
      </header>

      <!-- LIST VIEW -->
      <div id="listView" class="page-view active">
        <div id="loading" class="loading">⏳ Загрузка базы знаний...</div>
        <div id="emptyState" class="empty-state" style="display:none">
          <div class="empty-state-icon">🔍</div>
          <p style="font-size:18px;margin-bottom:8px">Ничего не найдено</p>
          <p class="text-muted">Попробуйте другие ключевые слова</p>
        </div>
        <div id="articlesContainer" class="content-grid"></div>
      </div>
      
      <!-- ARTICLE VIEW -->
      <div id="pageView" class="page-view">
        <div class="page-header">
          <h1 class="page-title" id="pageTitle"></h1>
          <div class="page-meta">
            <span id="pageCategory"></span>
            <span id="pageDate"></span>
            <span id="pageSlug" class="text-muted" style="font-family:monospace"></span>
          </div>
        </div>
        
        <div class="page-actions">
          <button class="btn btn-primary" onclick="copyPageContent()">
            <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Скопировать ответ
          </button>
          <button class="btn" onclick="showList()">
            <svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Назад к списку
          </button>
        </div>
        
        <article class="markdown-body" id="pageContent"></article>
      </div>
      
    </main>
  </div>

  <!-- IMAGE MODAL -->
  <div class="image-modal" id="imageModal" onclick="closeImageModal(event)">
    <div class="modal-close" onclick="closeImageModal(event, true)">×</div>
    <img src="" alt="" id="modalImage" onclick="event.stopPropagation()">
    <div class="modal-zoom-info"> Масштаб: <span id="zoomLevel">100</span>% • Закройте кликом или ×</div>
  </div>

  <!-- TOAST -->
  <div class="copy-toast" id="copyToast">
    <svg class="icon" viewBox="0 0 24 24" style="stroke:white"><polyline points="20 6 9 17 4 12"></polyline></svg>
    <span id="toastText">Скопировано!</span>
  </div>

  <script>
    // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
    let pages = [], fuse = null, categories = new Map();
    let currentCategory = 'all';
    let imageZoom = 1;
    let initialPinchDistance = null;
    
    const basePath = (() => {
      const path = window.location.pathname;
      const repo = path.split('/')[1] || '';
      return repo && !repo.includes('github.io') ? `/${repo}/` : '/';
    })();

    // ===== DOM ELEMENTS =====
    const els = {
      sidebar: document.getElementById('sidebar'),
      menuToggle: document.getElementById('menuToggle'),
      searchInput: document.getElementById('searchInput'),
      searchResults: document.getElementById('searchResults'),
      listView: document.getElementById('listView'),
      pageView: document.getElementById('pageView'),
      articlesContainer: document.getElementById('articlesContainer'),
      categoryList: document.getElementById('categoryList'),
      navAll: document.getElementById('navAll'),
      loading: document.getElementById('loading'),
      emptyState: document.getElementById('emptyState'),
      countBadge: document.getElementById('countBadge'),
      headerTitle: document.getElementById('headerTitle'),
      headerSub: document.getElementById('headerSub'),
      pageTitle: document.getElementById('pageTitle'),
      pageCategory: document.getElementById('pageCategory'),
      pageDate: document.getElementById('pageDate'),
      pageSlug: document.getElementById('pageSlug'),
      pageContent: document.getElementById('pageContent'),
      copyToast: document.getElementById('copyToast'),
      toastText: document.getElementById('toastText'),
      imageModal: document.getElementById('imageModal'),
      modalImage: document.getElementById('modalImage'),
      zoomLevel: document.getElementById('zoomLevel'),
      mainArea: document.querySelector('.main-area') || document.body
    };

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    async function init() {
      try {
        const res = await fetch(basePath + 'pages.json?' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();
        pages = data.pages || [];
        
        // Подсчет категорий
        categories.clear();
        categories.set('all', pages.length);
        pages.forEach(p => {
          if (p.category) {
            categories.set(p.category, (categories.get(p.category) || 0) + 1);
          }
        });
        
        renderCategories();
        renderList(pages);
        handleRoute();
        
        els.loading.style.display = 'none';
        setTimeout(() => els.searchInput?.focus(), 300);
        
      } catch (err) {
        console.error('❌ Ошибка:', err);
        els.loading.innerHTML = `
          <div style="color:#ff6b6b;font-size:18px;margin-bottom:12px">❌ Ошибка загрузки</div>
          <details style="font-size:13px;color:var(--text-muted);text-align:left;max-width:500px;margin:0 auto">
            <summary style="cursor:pointer;margin-bottom:10px">🔧 Как исправить?</summary>
            <ol style="padding-left:20px;line-height:2">
              <li>Проверьте вкладку <b>Actions</b> в репозитории</li>
              <li>Убедитесь, что <code>pages.json</code> есть в корне</li>
              <li>Settings → Pages → ветка <code>main</code>, папка <code>/</code></li>
              <li>Откройте <a href="${basePath}pages.json" target="_blank" style="color:var(--accent)">${basePath}pages.json</a></li>
            </ol>
          </details>
        `;
      }
    }

    // ===== РЕНДЕР КАТЕГОРИЙ =====
    function renderCategories() {
      els.categoryList.innerHTML = Array.from(categories.entries())
        .filter(([cat]) => cat !== 'all')
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([cat, count]) => `
          <div class="category-item ${currentCategory === cat ? 'active' : ''}" 
               onclick="filterByCategory('${escapeHtml(cat)}')" 
               data-category="${escapeHtml(cat)}">
            <span>${escapeHtml(cat)}</span>
            <span class="category-count">${count}</span>
          </div>
        `).join('');
    }

    // ===== АКТИВНАЯ НАВИГАЦИЯ =====
    function setActiveNav(category) {
      currentCategory = category;
      
      // Сброс всех
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
      
      if (category === 'all') {
        els.navAll.classList.add('active');
      } else {
        const catItem = document.querySelector(`.category-item[data-category="${category}"]`);
        if (catItem) catItem.classList.add('active');
      }
      
      renderCategories(); // Перерисовка для обновления выделения
    }

    // ===== РЕНДЕР СПИСКА =====
    function renderList(items) {
      els.articlesContainer.innerHTML = '';
      
      if (items.length === 0) {
        els.emptyState.style.display = 'block';
        els.countBadge.textContent = '0';
        return;
      }
      
      els.emptyState.style.display = 'none';
      els.countBadge.textContent = items.length;
      
      items.forEach(page => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.onclick = () => openPage(page.slug);
        
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">${escapeHtml(page.title)}</div>
            ${page.category ? `<span class="card-category">${escapeHtml(page.category)}</span>` : ''}
          </div>
          <div class="card-desc">${escapeHtml(page.description)}</div>
          <div class="card-footer">
            <span>📅 ${formatDate(page.date)}</span>
            <span class="text-accent">Открыть →</span>
          </div>
        `;
        
        els.articlesContainer.appendChild(card);
      });
    }

    // ===== ФИЛЬТР ПО КАТЕГОРИИ =====
    function filterByCategory(cat) {
      currentCategory = cat;
      const filtered = pages.filter(p => p.category === cat);
      els.headerTitle.textContent = cat;
      els.headerSub.innerHTML = `Найдено: <span id="countBadge">${filtered.length}</span>`;
      renderList(filtered);
      showList();
      setActiveNav(cat);
      closeSidebar();
    }

    // ===== ОТКРЫТИЕ СТРАНИЦЫ =====
    function openPage(slug) {
      const page = pages.find(p => p.slug === slug);
      if (!page) return;
      
      els.pageTitle.textContent = page.title;
      els.pageCategory.innerHTML = page.category ? `📁 ${escapeHtml(page.category)}` : '';
      els.pageDate.textContent = `📅 ${formatDate(page.date, true)}`;
      els.pageSlug.textContent = `#${page.slug}`;
      els.pageContent.innerHTML = page.content;
      
      // Инициализация кликов по картинкам
      initImageClicks();
      
      if (els.mainArea && typeof els.mainArea.scrollTop !== 'undefined') {
        els.mainArea.scrollTop = 0;
      }
      
      els.listView.classList.remove('active');
      els.pageView.classList.add('active');
      history.pushState({ slug }, '', `#${slug}`);
      closeSidebar();
    }

    // ===== ВОЗВРАТ К СПИСКУ =====
    function showList() {
      els.pageView.classList.remove('active');
      els.listView.classList.add('active');
      els.headerTitle.textContent = currentCategory === 'all' ? 'Все вопросы' : currentCategory;
      const count = currentCategory === 'all' ? pages.length : pages.filter(p => p.category === currentCategory).length;
      els.headerSub.innerHTML = `Найдено: <span id="countBadge">${count}</span>`;
      history.pushState({}, '', location.pathname);
      els.searchInput.value = '';
      els.searchResults.classList.remove('show');
      setActiveNav(currentCategory);
    }

    // ===== ПОИСК С УЛУЧШЕННЫМ ВЫДЕЛЕНИЕМ =====
    els.searchInput?.addEventListener('input', (e) => {
      const query = e.target.value.trim();
      
      if (query.length < 2) {
        els.searchResults.classList.remove('show');
        const items = currentCategory === 'all' ? pages : pages.filter(p => p.category === currentCategory);
        renderList(items);
        els.headerTitle.textContent = currentCategory === 'all' ? 'Все вопросы' : currentCategory;
        return;
      }
      
      const results = fuse.search(query).slice(0, 15);
      const items = results.map(r => r.item);
      
      els.searchResults.innerHTML = items.map(page => {
        const highlightedTitle = highlightMatch(page.title, query);
        const highlightedDesc = highlightMatch(page.description, query);
        
        return `
          <div class="result-item" onclick="openPage('${page.slug}'); els.searchResults.classList.remove('show'); els.searchInput.blur()">
            <div class="result-title">
              ${page.category ? `<span class="result-category">${escapeHtml(page.category)}</span>` : ''}
              ${highlightedTitle}
            </div>
            <div class="result-meta">${highlightedDesc}</div>
          </div>
        `;
      }).join('') || '<div class="result-item" style="cursor:default;color:var(--text-muted);text-align:center;padding:20px">Ничего не найдено</div>';
      
      els.searchResults.classList.add('show');
      els.headerTitle.textContent = `Результаты поиска: ${items.length}`;
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) {
        els.searchResults.classList.remove('show');
      }
    });

    // ===== КОПИРОВАНИЕ =====
    async function copyPageContent() {
      const text = els.pageContent?.innerText || '';
      try {
        await navigator.clipboard.writeText(text);
        showToast('Ответ скопирован в буфер обмена!');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Скопировано!');
      }
    }
    
    function showToast(msg) {
      els.toastText.textContent = msg;
      els.copyToast.classList.add('show');
      setTimeout(() => els.copyToast.classList.remove('show'), 2000);
    }

    // ===== SIDEBAR =====
    function toggleSidebar() {
      els.sidebar.classList.toggle('open');
      els.menuToggle.classList.toggle('active');
    }
    
    function closeSidebar() {
      els.sidebar.classList.remove('open');
      els.menuToggle.classList.remove('active');
    }
    
    function closeSidebarOnOutsideClick(e) {
      if (window.innerWidth <= 900 && 
          els.sidebar.classList.contains('open') && 
          !e.target.closest('.sidebar') && 
          !e.target.closest('.menu-toggle')) {
        closeSidebar();
      }
    }

    // ===== ГОРЯЧИЕ КЛАВИШИ =====
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        els.searchInput?.focus();
        els.searchInput?.select();
      }
      if (e.key === 'Escape') {
        els.searchResults.classList.remove('show');
        if (els.pageView.classList.contains('active')) {
          showList();
        }
        if (els.imageModal.classList.contains('active')) {
          closeImageModal(null, true);
        }
      }
    });
    
    window.addEventListener('hashchange', handleRoute);
    
    function handleRoute() {
      const slug = location.hash.slice(1);
      if (slug && pages.some(p => p.slug === slug)) {
        openPage(slug);
      }
    }

    // ===== ИЗОБРАЖЕНИЯ С ЗУМОМ =====
    function initImageClicks() {
      const images = els.pageContent.querySelectorAll('img');
      images.forEach(img => {
        img.onclick = (e) => {
          e.stopPropagation();
          openImageModal(img.src);
        };
      });
    }
    
    function openImageModal(src) {
      els.modalImage.src = src;
      els.modalImage.style.transform = 'scale(1)';
      imageZoom = 1;
      els.zoomLevel.textContent = '100';
      els.imageModal.classList.add('active');
      document.body.style.overflow = 'hidden';
      
      // Инициализация pinch-to-zoom
      initPinchZoom();
    }
    
    function closeImageModal(e, force = false) {
      if (force || e.target === els.imageModal) {
        els.imageModal.classList.remove('active');
        document.body.style.overflow = '';
        imageZoom = 1;
      }
    }
    
    function initPinchZoom() {
      let initialDistance = null;
      let initialScale = 1;
      
      els.imageModal.addEventListener('touchstart', handleTouchStart, {passive: false});
      els.imageModal.addEventListener('touchmove', handleTouchMove, {passive: false});
      els.imageModal.addEventListener('touchend', handleTouchEnd, {passive: false});
      
      function handleTouchStart(e) {
        if (e.touches.length === 2) {
          e.preventDefault();
          initialDistance = getDistance(e.touches);
          initialScale = imageZoom;
        }
      }
      
      function handleTouchMove(e) {
        if (e.touches.length === 2 && initialDistance) {
          e.preventDefault();
          const distance = getDistance(e.touches);
          const scale = initialScale * (distance / initialDistance);
          imageZoom = Math.max(1, Math.min(scale, 5));
          els.modalImage.style.transform = `scale(${imageZoom})`;
          els.zoomLevel.textContent = Math.round(imageZoom * 100);
        }
      }
      
      function handleTouchEnd(e) {
        initialDistance = null;
      }
      
      function getDistance(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }
      
      // Wheel zoom для десктопа
      els.modalImage.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        imageZoom = Math.max(1, Math.min(imageZoom * delta, 5));
        els.modalImage.style.transform = `scale(${imageZoom})`;
        els.zoomLevel.textContent = Math.round(imageZoom * 100);
      }, {passive: false});
      
      // Двойной клик для зума
      let lastClick = 0;
      els.modalImage.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - lastClick < 300) {
          imageZoom = imageZoom > 1 ? 1 : 2.5;
          els.modalImage.style.transform = `scale(${imageZoom})`;
          els.zoomLevel.textContent = Math.round(imageZoom * 100);
        }
        lastClick = now;
      });
    }

    // ===== УТИЛИТЫ =====
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    function highlightMatch(text, query) {
      if (!text) return '';
      const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${safe})`, 'gi');
      return text.replace(regex, '<mark>$1</mark>');
    }
    
    function formatDate(dateStr, full = false) {
      const d = new Date(dateStr);
      if (full) {
        return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
      }
      return d.toLocaleDateString('ru-RU');
    }

    // ===== ЗАПУСК =====
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
