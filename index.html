<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#121212"/>
  <title>Вопрос/Ответ</title>
  
  <!-- Prism.js для подсветки кода -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.basic.min.js"></script>
  
  <style>
    :root {
      --bg-body: #0f0f0f;
      --bg-sidebar: #161616;
      --bg-card: #1e1e1e;
      --bg-card-hover: #252525;
      --bg-element: #2a2a2a;
      --bg-search: #1a1a1a;
      --bg-code: #1e1e1e;
      
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      
      --accent: #4caf50;
      --accent-hover: #66bb6a;
      --accent-soft: rgba(76, 175, 80, 0.15);
      --border: #333333;
      --border-light: #444444;
      
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      font-size: 16px;
      line-height: 1.6;
    }

    .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
    .icon-lg { width: 28px; height: 28px; }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    
    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      font-weight: 700;
      font-size: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    
    .sidebar-header .logo-icon { color: var(--accent); }
    .nav-section { margin-bottom: 24px; }
    
    .nav-title {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1.2px;
      margin-bottom: 12px;
      font-weight: 700;
      padding: 0 12px;
    }
    
    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      font-size: 14px;
      margin-bottom: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    
    .nav-link:hover { background: var(--bg-card); color: var(--text-primary); }
    .nav-link.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3); }
    
    .category-list { max-height: 300px; overflow-y: auto; }
    
    .category-item {
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .category-item:hover { background: var(--bg-card); color: var(--text-primary); }
    .category-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-left: 3px solid var(--accent);
      padding-left: 9px;
    }
    
    .category-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-element);
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .category-item.active .category-count { background: var(--accent); color: white; }

    /* MOBILE MENU */
    .menu-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 200;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    
    .menu-toggle.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* MAIN AREA */
    .main-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      scroll-behavior: smooth;
    }
    
    .main-area::-webkit-scrollbar { width: 8px; }
    .main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* HEADER */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .header-title h2 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .header-title p { color: var(--text-muted); font-size: 14px; }
    
    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 520px;
      flex: 1;
      min-width: 240px;
    }
    
    .search-input {
      width: 100%;
      background: var(--bg-search);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px 14px 48px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: var(--transition);
    }
    
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    
    .search-icon-pos { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-shortcut {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-element);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* SEARCH RESULTS */
    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 60vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      z-index: 150;
      display: none;
    }
    
    .search-results.show { display: block; }
    
    .result-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    
    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: var(--bg-element); }
    
    .result-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 6px;
    }
    
    .result-title mark {
      background: rgba(255, 193, 7, 0.3);
      color: #ffd54f;
      padding: 0 4px;
      border-radius: 3px;
    }
    
    .result-meta { font-size: 13px; color: var(--text-muted); }
    .result-category {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      margin-right: 8px;
    }

    /* GRID */
    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* CARD */
    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .article-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }
    
    .card-title { font-weight: 600; font-size: 17px; flex: 1; }
    
    .card-category {
      font-size: 11px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 700;
    }
    
    .card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* PAGE VIEW */
    .page-view { display: none; }
    .page-view.active { display: block; animation: fadeIn 0.3s ease; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    
    .page-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    
    .page-title { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
    
    .page-meta {
      display: flex;
      gap: 16px;
      font-size: 14px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    
    .page-actions {
      display: flex;
      gap: 12px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    
    .btn {
      background: var(--bg-element);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn:hover { background: var(--bg-card-hover); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }

    /* MARKDOWN STYLES */
    .markdown-body {
      font-size: 17px;
      line-height: 1.8;
      color: var(--text-primary);
    }
    
    .markdown-body h1 { font-size: 28px; margin: 32px 0 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
    .markdown-body h2 { font-size: 24px; margin: 28px 0 16px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
    .markdown-body h3 { font-size: 20px; margin: 24px 0 12px; }
    .markdown-body h4 { font-size: 18px; margin: 20px 0 10px; }
    .markdown-body p { margin: 16px 0; }
    .markdown-body strong { font-weight: 700; }
    .markdown-body em { font-style: italic; color: var(--text-secondary); }
    .markdown-body del { color: var(--text-muted); text-decoration: line-through; }
    
    /* Code */
    .markdown-body code {
      background: var(--bg-code);
      color: #f8f8f2;
      padding: 3px 8px;
      border-radius: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 0.9em;
      border: 1px solid var(--border);
    }
    
    .markdown-body pre {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      overflow-x: auto;
      margin: 20px 0;
    }
    
    .markdown-body pre code {
      background: none;
      padding: 0;
      border: none;
      font-size: 14px;
      line-height: 1.6;
    }
    
    /* Tables - ИСПРАВЛЕНО: Добавлены вертикальные линии */
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      overflow: hidden;
    }
    
    .markdown-body th {
      background: var(--bg-element);
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
      padding: 14px 16px;
      text-align: left;
      border-bottom: 2px solid var(--border-light);
      border-right: 1px solid var(--border); /* Вертикальная линия справа */
    }
    
    .markdown-body th:last-child {
      border-right: none; /* Убираем линию у последней ячейки заголовка */
    }

    .markdown-body td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border); /* Вертикальная линия справа */
      color: var(--text-secondary);
    }
    
    .markdown-body td:last-child {
      border-right: none; /* Убираем линию у последней ячейки строки */
    }
    
    .markdown-body tr:hover td { background: var(--bg-card); color: var(--text-primary); }
    
    /* Lists */
    .markdown-body ul, .markdown-body ol { padding-left: 28px; margin: 16px 0; }
    .markdown-body li { margin: 10px 0; }
    .markdown-body ul li::marker { color: var(--accent); }
    .markdown-body ol li::marker { color: var(--accent); font-weight: 600; }
    
    /* Blockquotes */
    .markdown-body blockquote {
      margin: 20px 0;
      padding: 1px 20px;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--text-secondary);
    }
    
    /* Links */
    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dashed var(--accent);
    }
    
    .markdown-body a:hover {
      border-bottom-style: solid;
      background: var(--accent-soft);
      padding: 0 4px;
      border-radius: 4px;
    }
    
    /* Images */
    .markdown-body img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 20px 0;
      border: 1px solid var(--border);
      cursor: zoom-in;
    }
    
    .markdown-body hr {
      border: none;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 32px 0;
    }

    /* IMAGE MODAL */
    .image-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }
    
    .image-modal.active { display: flex; }
    .image-modal img { max-width: 90%; max-height: 90%; transform-origin: center; transition: transform 0.1s; }
    
    .modal-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      cursor: pointer;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    
    .modal-close:hover { background: rgba(255,255,255,0.2); }
    .modal-zoom-info {
      position: absolute;
      bottom: 30px;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 20px;
    }

    /* EMPTY/LOADING */
    .loading, .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }

    /* TOAST */
    .copy-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent);
      color: white;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-weight: 600;
      box-shadow: var(--shadow);
      z-index: 1000;
      transition: transform 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .copy-toast.show { transform: translateX(-50%) translateY(0); }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        width: 300px;
        z-index: 180;
        transform: translateX(-100%);
        box-shadow: var(--shadow);
      }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .main-area { padding: 80px 20px 20px; }
      .header-bar { flex-direction: column; align-items: stretch; }
      .content-grid { grid-template-columns: 1fr; }
    }
    
    @media (max-width: 480px) {
      .page-actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }

    .hidden { display: none !important; }
    .text-accent { color: var(--accent); }
    .text-muted { color: var(--text-muted); }
  </style>
</head>
<body>

  <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
    <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
  </button>

  <div id="app-container" style="display:flex;height:100vh;">
    
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg class="icon icon-lg logo-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Вопрос/Ответ
      </div>
      
      <div class="nav-section">
        <div class="nav-title">Навигация</div>
        <div class="nav-link active" id="navAll" onclick="showList(); setActiveNav('all')">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Все вопросы
        </div>
      </div>
      
      <div class="nav-section">
        <div class="nav-title">Категории</div>
        <div class="category-list" id="categoryList"></div>
      </div>
    </aside>

    <main class="main-area" id="mainArea" onclick="closeSidebarOnOutsideClick(event)">
      
      <header class="header-bar">
        <div class="header-title">
          <h2 id="headerTitle">Все вопросы</h2>
          <p id="headerSub">Найдено: <span id="countBadge">0</span></p>
        </div>
        <div class="search-wrapper">
          <svg class="icon search-icon-pos" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Поиск..." autocomplete="off">
          <span class="search-shortcut">Ctrl+K</span>
          <div class="search-results" id="searchResults"></div>
        </div>
      </header>

      <div id="listView" class="page-view active">
        <div id="loading" class="loading">⏳ Загрузка...</div>
        <div id="emptyState" class="empty-state" style="display:none">
          <div class="empty-state-icon">🔍</div>
          <p>Ничего не найдено</p>
        </div>
        <div id="articlesContainer" class="content-grid"></div>
      </div>
      
      <div id="pageView" class="page-view">
        <div class="page-header">
          <h1 class="page-title" id="pageTitle"></h1>
          <div class="page-meta">
            <span id="pageCategory"></span>
            <span id="pageDate"></span>
          </div>
        </div>
        
        <div class="page-actions">
          <button class="btn btn-primary" onclick="copyPageContent()">
            <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Скопировать
          </button>
          <button class="btn" onclick="showList()">
            <svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Назад
          </button>
        </div>
        
        <article class="markdown-body" id="pageContent"></article>
      </div>
      
    </main>
  </div>

  <div class="image-modal" id="imageModal" onclick="closeImageModal(event)">
    <div class="modal-close" onclick="closeImageModal(event, true)">×</div>
    <img src="" alt="" id="modalImage" onclick="event.stopPropagation()">
    <div class="modal-zoom-info">Масштаб: <span id="zoomLevel">100</span>%</div>
  </div>

  <div class="copy-toast" id="copyToast">
    <svg class="icon" viewBox="0 0 24 24" style="stroke:white"><polyline points="20 6 9 17 4 12"></polyline></svg>
    <span id="toastText">Скопировано!</span>
  </div>

  <script>
    let pages = [], fuse = null, categories = new Map();
    let currentCategory = 'all';
    let imageZoom = 1;
    
    const basePath = (() => {
      const path = window.location.pathname;
      const repo = path.split('/')[1] || '';
      return repo && !repo.includes('github.io') ? `/${repo}/` : '/';
    })();

    const els = {
      sidebar: document.getElementById('sidebar'),
      menuToggle: document.getElementById('menuToggle'),
      searchInput: document.getElementById('searchInput'),
      searchResults: document.getElementById('searchResults'),
      listView: document.getElementById('listView'),
      pageView: document.getElementById('pageView'),
      articlesContainer: document.getElementById('articlesContainer'),
      categoryList: document.getElementById('categoryList'),
      navAll: document.getElementById('navAll'),
      loading: document.getElementById('loading'),
      emptyState: document.getElementById('emptyState'),
      countBadge: document.getElementById('countBadge'),
      headerTitle: document.getElementById('headerTitle'),
      headerSub: document.getElementById('headerSub'),
      pageTitle: document.getElementById('pageTitle'),
      pageCategory: document.getElementById('pageCategory'),
      pageDate: document.getElementById('pageDate'),
      pageContent: document.getElementById('pageContent'),
      copyToast: document.getElementById('copyToast'),
      imageModal: document.getElementById('imageModal'),
      modalImage: document.getElementById('modalImage'),
      zoomLevel: document.getElementById('zoomLevel'),
      mainArea: document.querySelector('.main-area')
    };

    async function init() {
      try {
        const res = await fetch(basePath + 'pages.json?' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();
        pages = data.pages || [];
        
        categories.clear();
        categories.set('all', pages.length);
        pages.forEach(p => {
          if (p.category) categories.set(p.category, (categories.get(p.category) || 0) + 1);
        });
        
        renderCategories();
        renderList(pages);
        handleRoute();
        
        els.loading.style.display = 'none';
        
        fuse = new Fuse(pages, {
          keys: ['title', 'description', 'searchText', 'category'],
          threshold: 0.3,
          minMatchCharLength: 2
        });
        
      } catch (err) {
        console.error('❌', err);
        els.loading.innerHTML = `<div style="color:#ff6b6b">❌ Ошибка</div><details style="font-size:13px;color:var(--text-muted);margin-top:10px"><summary>Помощь</summary><ol><li>Проверьте Actions</li><li>Есть ли pages.json?</li><li>Settings → Pages → main, /</li></ol></details>`;
      }
    }

    function renderCategories() {
      els.categoryList.innerHTML = Array.from(categories.entries())
        .filter(([cat]) => cat !== 'all')
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([cat, count]) => `
          <div class="category-item ${currentCategory === cat ? 'active' : ''}" onclick="filterByCategory('${escapeHtml(cat)}')" data-category="${escapeHtml(cat)}">
            <span>${escapeHtml(cat)}</span>
            <span class="category-count">${count}</span>
          </div>
        `).join('');
    }

    function setActiveNav(category) {
      currentCategory = category;
      document.querySelectorAll('.nav-link, .category-item').forEach(el => el.classList.remove('active'));
      if (category === 'all') els.navAll.classList.add('active');
      else {
        const item = document.querySelector(`.category-item[data-category="${category}"]`);
        if (item) item.classList.add('active');
      }
      renderCategories();
    }

    function renderList(items) {
      els.articlesContainer.innerHTML = '';
      if (items.length === 0) { els.emptyState.style.display = 'block'; els.countBadge.textContent = '0'; return; }
      els.emptyState.style.display = 'none';
      els.countBadge.textContent = items.length;
      
      items.forEach(page => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.onclick = () => openPage(page.slug);
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">${escapeHtml(page.title)}</div>
            ${page.category ? `<span class="card-category">${escapeHtml(page.category)}</span>` : ''}
          </div>
          <div class="card-desc">${escapeHtml(page.description)}</div>
          <div class="card-footer">
            <span>📅 ${formatDate(page.date)}</span>
            <span class="text-accent">Открыть →</span>
          </div>
        `;
        els.articlesContainer.appendChild(card);
      });
    }

    function filterByCategory(cat) {
      currentCategory = cat;
      const filtered = pages.filter(p => p.category === cat);
      els.headerTitle.textContent = cat;
      els.headerSub.innerHTML = `Найдено: <span>${filtered.length}</span>`;
      renderList(filtered);
      showList();
      setActiveNav(cat);
      closeSidebar();
    }

    function openPage(slug) {
      const page = pages.find(p => p.slug === slug);
      if (!page) return;
      
      els.pageTitle.textContent = page.title;
      els.pageCategory.innerHTML = page.category ? `📁 ${escapeHtml(page.category)}` : '';
      els.pageDate.textContent = `📅 ${formatDate(page.date, true)}`;
      els.pageContent.innerHTML = page.content;
      
      if (typeof Prism !== 'undefined') Prism.highlightAllUnder(els.pageContent);
      initImageClicks();
      
      els.mainArea.scrollTop = 0;
      els.listView.classList.remove('active');
      els.pageView.classList.add('active');
      history.pushState({ slug }, '', `#${slug}`);
      closeSidebar();
    }

    function showList() {
      els.pageView.classList.remove('active');
      els.listView.classList.add('active');
      els.headerTitle.textContent = currentCategory === 'all' ? 'Все вопросы' : currentCategory;
      const count = currentCategory === 'all' ? pages.length : pages.filter(p => p.category === currentCategory).length;
      els.headerSub.innerHTML = `Найдено: <span>${count}</span>`;
      history.pushState({}, '', location.pathname);
      els.searchInput.value = '';
      els.searchResults.classList.remove('show');
      setActiveNav(currentCategory);
    }

    els.searchInput?.addEventListener('input', (e) => {
      const query = e.target.value.trim();
      if (query.length < 2) {
        els.searchResults.classList.remove('show');
        renderList(currentCategory === 'all' ? pages : pages.filter(p => p.category === currentCategory));
        return;
      }
      
      const results = fuse.search(query).slice(0, 15);
      els.searchResults.innerHTML = results.map(r => {
        const page = r.item;
        const title = highlightMatch(page.title, query);
        const desc = highlightMatch(page.description, query);
        return `
          <div class="result-item" onclick="openPage('${page.slug}');els.searchResults.classList.remove('show')">
            <div class="result-title">${page.category ? `<span class="result-category">${escapeHtml(page.category)}</span>` : ''}${title}</div>
            <div class="result-meta">${desc}</div>
          </div>
        `;
      }).join('') || '<div class="result-item" style="text-align:center;color:var(--text-muted)">Не найдено</div>';
      
      els.searchResults.classList.add('show');
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) els.searchResults.classList.remove('show');
    });

    async function copyPageContent() {
      const page = pages.find(p => p.slug === location.hash.slice(1));
      const text = page?.rawContent || els.pageContent?.innerText || '';
      try {
        await navigator.clipboard.writeText(text);
        showToast();
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast();
      }
    }
    
    function showToast() {
      els.copyToast.classList.add('show');
      setTimeout(() => els.copyToast.classList.remove('show'), 2000);
    }

    function toggleSidebar() {
      els.sidebar.classList.toggle('open');
      els.menuToggle.classList.toggle('active');
    }
    
    function closeSidebar() {
      els.sidebar.classList.remove('open');
      els.menuToggle.classList.remove('active');
    }
    
    function closeSidebarOnOutsideClick(e) {
      if (window.innerWidth <= 900 && els.sidebar.classList.contains('open') && !e.target.closest('.sidebar') && !e.target.closest('.menu-toggle')) {
        closeSidebar();
      }
    }

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        els.searchInput?.focus();
      }
      if (e.key === 'Escape') {
        els.searchResults.classList.remove('show');
        if (els.pageView.classList.contains('active')) showList();
        if (els.imageModal.classList.contains('active')) closeImageModal(null, true);
      }
    });
    
    window.addEventListener('hashchange', handleRoute);
    
    function handleRoute() {
      const slug = location.hash.slice(1);
      if (slug && pages.some(p => p.slug === slug)) openPage(slug);
    }

    function initImageClicks() {
      els.pageContent.querySelectorAll('img').forEach(img => {
        img.onclick = (e) => { e.stopPropagation(); openImageModal(img.src); };
      });
    }
    
    function openImageModal(src) {
      els.modalImage.src = src;
      imageZoom = 1;
      els.zoomLevel.textContent = '100';
      els.imageModal.classList.add('active');
      document.body.style.overflow = 'hidden';
      initPinchZoom();
    }
    
    function closeImageModal(e, force = false) {
      if (force || e.target === els.imageModal) {
        els.imageModal.classList.remove('active');
        document.body.style.overflow = '';
      }
    }
    
    function initPinchZoom() {
      let initialDist = null, initialScale = 1;
      
      const onStart = (e) => {
        if (e.touches.length === 2) {
          e.preventDefault();
          initialDist = getDist(e.touches);
          initialScale = imageZoom;
        }
      };
      
      const onMove = (e) => {
        if (e.touches.length === 2 && initialDist) {
          e.preventDefault();
          const dist = getDist(e.touches);
          imageZoom = Math.max(1, Math.min(initialScale * (dist / initialDist), 5));
          els.modalImage.style.transform = `scale(${imageZoom})`;
          els.zoomLevel.textContent = Math.round(imageZoom * 100);
        }
      };
      
      const onEnd = () => { initialDist = null; };
      const getDist = (t) => Math.sqrt(Math.pow(t[0].clientX - t[1].clientX, 2) + Math.pow(t[0].clientY - t[1].clientY, 2));
      
      els.imageModal.addEventListener('touchstart', onStart, {passive: false});
      els.imageModal.addEventListener('touchmove', onMove, {passive: false});
      els.imageModal.addEventListener('touchend', onEnd, {passive: false});
      
      els.modalImage.addEventListener('wheel', (e) => {
        e.preventDefault();
        imageZoom = Math.max(1, Math.min(imageZoom * (e.deltaY > 0 ? 0.9 : 1.1), 5));
        els.modalImage.style.transform = `scale(${imageZoom})`;
        els.zoomLevel.textContent = Math.round(imageZoom * 100);
      }, {passive: false});
      
      let lastClick = 0;
      els.modalImage.addEventListener('click', (e) => {
        const now = Date.now();
        if (now - lastClick < 300) {
          imageZoom = imageZoom > 1 ? 1 : 2.5;
          els.modalImage.style.transform = `scale(${imageZoom})`;
          els.zoomLevel.textContent = Math.round(imageZoom * 100);
        }
        lastClick = now;
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
    
    function highlightMatch(text, query) {
      if (!text) return '';
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(regex, '<mark>$1</mark>');
    }
    
    function formatDate(dateStr, full = false) {
      const d = new Date(dateStr);
      return full ? d.toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' }) : d.toLocaleDateString('ru-RU');
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
