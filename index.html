<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#121212"/>
  <title>Вопрос/Ответ</title>
  
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.basic.min.js"></script>
  
  <style>
    :root {
      --bg-body: #121212; --bg-sidebar: #161616; --bg-card: #1e1e1e;
      --bg-card-hover: #252525; --bg-element: #2a2a2a; --bg-search: #1a1a1a;
      --text-primary: #ffffff; --text-secondary: #a0a0a0; --text-muted: #666666;
      --accent: #4caf50; --accent-hover: #66bb6a; --accent-soft: rgba(76,175,80,0.15);
      --border: #333333; --transition: all 0.2s ease; --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-body); color: var(--text-primary);
      height: 100vh; overflow: hidden; font-size: 16px; line-height: 1.5;
    }
    .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
    .icon-lg { width: 28px; height: 28px; }
    
    /* SIDEBAR */
    .sidebar {
      width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px 16px; flex-shrink: 0;
    }
    .sidebar-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
      font-weight: 700; font-size: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .sidebar-header .logo-icon { color: var(--accent); }
    .nav-section { margin-bottom: 20px; }
    .nav-title {
      font-size: 11px; text-transform: uppercase; color: var(--text-muted);
      letter-spacing: 0.8px; margin-bottom: 10px; font-weight: 600; padding: 0 8px;
    }
    .nav-link {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      color: var(--text-secondary); text-decoration: none; border-radius: 8px;
      transition: var(--transition); font-size: 14px; margin-bottom: 4px; cursor: pointer;
    }
    .nav-link:hover, .nav-link.active { background: var(--bg-element); color: var(--text-primary); }
    .nav-link.active { background: var(--accent-soft); color: var(--accent); }
    .category-list { max-height: 200px; overflow-y: auto; }
    .category-item {
      padding: 6px 12px; font-size: 13px; color: var(--text-secondary);
      cursor: pointer; border-radius: 6px; transition: var(--transition);
    }
    .category-item:hover, .category-item.active { background: var(--bg-element); color: var(--text-primary); }
    
    /* MOBILE MENU */
    .menu-toggle {
      display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 8px; border-radius: 8px; cursor: pointer;
    }
    .menu-toggle.active { background: var(--accent); border-color: var(--accent); }
    
    /* MAIN AREA */
    .main-area {
      flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; scroll-behavior: smooth; position: relative;
    }
    .main-area::-webkit-scrollbar { width: 6px; }
    .main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    /* HEADER + SEARCH */
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
    .header-title h2 { font-size: 22px; font-weight: 700; }
    .header-title p { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
    .search-wrapper { position: relative; width: 100%; max-width: 480px; flex: 1; min-width: 200px; }
    .search-input {
      width: 100%; background: var(--bg-search); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px 12px 42px; color: var(--text-primary);
      font-size: 15px; outline: none; transition: var(--transition);
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .search-icon-pos { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-shortcut {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: var(--text-muted); background: var(--bg-element);
      padding: 2px 6px; border-radius: 4px;
    }
    
    /* SEARCH RESULTS */
    .search-results {
      position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius);
      margin-top: 6px; max-height: 50vh; overflow-y: auto; box-shadow: var(--shadow);
      z-index: 150; display: none;
    }
    .search-results.show { display: block; animation: slideDown 0.2s ease; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
    .result-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: var(--transition); }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover, .result-item.active { background: var(--bg-element); }
    .result-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .result-title mark { background: var(--accent-soft); color: var(--accent); padding: 0 3px; border-radius: 3px; font-weight: 700; }
    .result-meta { font-size: 12px; color: var(--text-muted); }
    .result-category {
      display: inline-block; background: var(--accent-soft); color: var(--accent);
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 6px;
    }
    
    /* CONTENT GRID */
    .section-title {
      font-size: 18px; font-weight: 700; margin: 24px 0 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::before {
      content: ''; display: block; width: 3px; height: 18px;
      background: var(--accent); border-radius: 2px;
    }
    .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    
    /* CARD — ВЕСЬ БЛОК КЛИКАБЕЛЬНЫЙ */
    .article-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; cursor: pointer;
      transition: var(--transition); display: flex; flex-direction: column; gap: 10px;
      user-select: none;
    }
    .article-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow); }
    .article-card:active { transform: scale(0.99); }
    .card-header { display: flex; justify-content: space-between; align-items: start; gap: 10px; pointer-events: none; }
    .card-title { font-weight: 600; font-size: 16px; line-height: 1.4; pointer-events: none; }
    .card-category {
      font-size: 11px; background: var(--accent-soft); color: var(--accent);
      padding: 3px 8px; border-radius: 4px; font-weight: 600; flex-shrink: 0; pointer-events: none;
    }
    .card-desc {
      font-size: 14px; color: var(--text-secondary); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      pointer-events: none;
    }
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--text-muted); margin-top: 4px; pointer-events: none;
    }
    .card-footer .text-accent { pointer-events: none; }
    
    /* PAGE VIEW */
    .page-view { display: none; animation: fadeIn 0.3s ease; }
    .page-view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .page-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .page-meta { display: flex; gap: 12px; font-size: 13px; color: var(--text-muted); flex-wrap: wrap; align-items: center; }
    .page-meta span { display: flex; align-items: center; gap: 4px; }
    .page-actions { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
    .btn {
      background: var(--bg-element); color: var(--text-primary); border: 1px solid var(--border);
      padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: var(--bg-card-hover); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    
    /* MARKDOWN CONTENT — БАЗОВЫЙ */
    .markdown-body { font-size: 16px; line-height: 1.7; color: var(--text-primary); }
    .markdown-body h1 { font-size: 22px; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .markdown-body h2 { font-size: 20px; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .markdown-body h3 { font-size: 18px; margin: 16px 0 8px; }
    .markdown-body p { margin: 12px 0; }
    .markdown-body strong { color: var(--text-primary); font-weight: 600; }
    .markdown-body em { color: var(--text-secondary); font-style: italic; }
    .markdown-body code {
      background: var(--bg-element); padding: 2px 6px; border-radius: 4px;
      font-family: ui-monospace, monospace; font-size: 0.95em;
    }
    
    /* EMPTY / LOADING */
    .loading, .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
    
    /* RESPONSIVE */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed; top: 0; left: 0; height: 100%; width: 280px; z-index: 180;
        transform: translateX(-100%); transition: transform 0.3s ease; box-shadow: var(--shadow);
      }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .main-area { padding: 70px 16px 20px; }
      .header-bar { flex-direction: column; align-items: stretch; }
      .search-wrapper { max-width: 100%; }
      .content-grid { grid-template-columns: 1fr; }
      .page-title { font-size: 22px; }
    }
    @media (max-width: 480px) {
      .page-actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
    .hidden { display: none !important; }
    .text-accent { color: var(--accent); }
    .text-muted { color: var(--text-muted); }
  </style>
</head>
<body>

  <!-- 📱 MOBILE MENU TOGGLE -->
  <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
    <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
  </button>

  <!-- 🖥️ MAIN APP -->
  <div id="app-container" style="display:flex;height:100vh;opacity:1;transform:scale(1);">
    
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg class="icon icon-lg logo-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Вопрос/Ответ
      </div>
      
      <div class="nav-section">
        <div class="nav-title">Навигация</div>
        <div class="nav-link active" onclick="showList()">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Все вопросы
        </div>
      </div>
      
      <div class="nav-section">
        <div class="nav-title">Категории</div>
        <div class="category-list" id="categoryList"></div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-area" id="mainArea" onclick="closeSidebarOnOutsideClick(event)">
      
      <!-- HEADER -->
      <header class="header-bar">
        <div class="header-title">
          <h2 id="headerTitle">Все вопросы</h2>
          <p id="headerSub">Найдено: <span id="countBadge">0</span></p>
        </div>
        <div class="search-wrapper">
          <svg class="icon search-icon-pos" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Поиск..." autocomplete="off">
          <span class="search-shortcut">Ctrl+K</span>
          <div class="search-results" id="searchResults"></div>
        </div>
      </header>

      <!-- LIST VIEW -->
      <div id="listView" class="page-view active">
        <div id="loading" class="loading">⏳ Загрузка...</div>
        <div id="emptyState" class="empty-state" style="display:none">
          <div class="empty-state-icon">🔍</div>
          <p>Ничего не найдено</p>
        </div>
        <div id="articlesContainer" class="content-grid"></div>
      </div>
      
      <!-- ARTICLE VIEW -->
      <div id="pageView" class="page-view">
        <div class="page-header">
          <h1 class="page-title" id="pageTitle"></h1>
          <div class="page-meta">
            <span id="pageCategory"></span>
            <span id="pageDate"></span>
            <span id="pageSlug" class="text-muted" style="font-family:monospace"></span>
          </div>
        </div>
        
        <div class="page-actions">
          <button class="btn btn-primary" onclick="copyPageContent()">
            <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Скопировать
          </button>
          <button class="btn" onclick="showList()">
            <svg class="icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Назад
          </button>
        </div>
        
        <article class="markdown-body" id="pageContent"></article>
      </div>
      
    </main>
  </div>

  <!-- TOAST -->
  <div class="copy-toast" id="copyToast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent);color:white;padding:12px 24px;border-radius:10px;font-weight:500;box-shadow:var(--shadow);z-index:1000;transition:transform 0.3s ease;display:flex;align-items:center;gap:8px;">
    <svg class="icon" viewBox="0 0 24 24" style="stroke:white"><polyline points="20 6 9 17 4 12"></polyline></svg>
    <span id="toastText">Скопировано!</span>
  </div>

  <script>
    // ===== ГЛОБАЛЬНЫЕ =====
    let pages = [], fuse = null, categories = new Set();
    const basePath = (() => {
      const path = window.location.pathname;
      const repo = path.split('/')[1] || '';
      return repo && !repo.includes('github.io') ? `/${repo}/` : '/';
    })();

    // ===== DOM =====
    const els = {
      sidebar: document.getElementById('sidebar'),
      menuToggle: document.getElementById('menuToggle'),
      searchInput: document.getElementById('searchInput'),
      searchResults: document.getElementById('searchResults'),
      listView: document.getElementById('listView'),
      pageView: document.getElementById('pageView'),
      articlesContainer: document.getElementById('articlesContainer'),
      categoryList: document.getElementById('categoryList'),
      loading: document.getElementById('loading'),
      emptyState: document.getElementById('emptyState'),
      countBadge: document.getElementById('countBadge'),
      headerTitle: document.getElementById('headerTitle'),
      headerSub: document.getElementById('headerSub'),
      pageTitle: document.getElementById('pageTitle'),
      pageCategory: document.getElementById('pageCategory'),
      pageDate: document.getElementById('pageDate'),
      pageSlug: document.getElementById('pageSlug'),
      pageContent: document.getElementById('pageContent'),
      copyToast: document.getElementById('copyToast'),
      toastText: document.getElementById('toastText'),
      // FIX: безопасное получение mainArea
      get mainArea() {
        return document.querySelector('.main-area') || document.body;
      }
    };

    // ===== INIT =====
    async function init() {
      try {
        const res = await fetch(basePath + 'pages.json?' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        pages = data.pages || [];
        
        pages.forEach(p => {
          if (p.category) categories.add(p.category);
          p.searchText = `${p.title} ${p.description} ${p.content.replace(/<[^>]*>/g, ' ')}`.toLowerCase();
        });
        
        fuse = new Fuse(pages, {
          keys: ['title', 'description', 'searchText', 'category'],
          threshold: 0.25, minMatchCharLength: 2, includeMatches: true
        });
        
        renderCategories();
        renderList(pages);
        handleRoute();
        els.loading.style.display = 'none';
        setTimeout(() => els.searchInput?.focus(), 300);
      } catch (err) {
        console.error('❌ Ошибка:', err);
        els.loading.innerHTML = `<div style="color:#ff6b6b">❌ Ошибка загрузки</div><details style="font-size:13px;color:var(--text-muted);margin-top:10px;text-align:left"><summary>🔧 Помощь</summary><ol style="padding-left:18px;margin-top:8px"><li>Проверь Actions в репозитории</li><li>Есть ли pages.json в корне?</li><li>Settings → Pages → main, /</li></ol></details>`;
      }
    }

    // ===== РЕНДЕР =====
    function renderCategories() {
      els.categoryList.innerHTML = Array.from(categories).sort().map(cat => `
        <div class="category-item" onclick="filterByCategory('${escapeHtml(cat)}')">${escapeHtml(cat)}</div>
      `).join('');
    }
    
    function renderList(items) {
      els.articlesContainer.innerHTML = '';
      if (items.length === 0) { els.emptyState.style.display = 'block'; els.countBadge.textContent = '0'; return; }
      els.emptyState.style.display = 'none';
      els.countBadge.textContent = items.length;
      
      items.forEach(page => {
        const card = document.createElement('div');
        card.className = 'article-card';
        // ВЕСЬ БЛОК КЛИКАБЕЛЬНЫЙ — onclick на карточке
        card.onclick = (e) => { e.preventDefault(); openPage(page.slug); };
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">${escapeHtml(page.title)}</div>
            ${page.category ? `<span class="card-category">${escapeHtml(page.category)}</span>` : ''}
          </div>
          <div class="card-desc">${escapeHtml(page.description)}</div>
          <div class="card-footer">
            <span>📅 ${formatDate(page.date)}</span>
            <span class="text-accent">Открыть →</span>
          </div>
        `;
        els.articlesContainer.appendChild(card);
      });
    }

    // ===== ФИЛЬТР / ОТКРЫТИЕ =====
    function filterByCategory(cat) {
      const filtered = pages.filter(p => p.category === cat);
      els.headerTitle.textContent = cat;
      renderList(filtered);
      showList();
      closeSidebar();
    }
    
    function openPage(slug) {
      const page = pages.find(p => p.slug === slug);
      if (!page) return;
      
      els.pageTitle.textContent = page.title;
      els.pageCategory.innerHTML = page.category ? `📁 ${escapeHtml(page.category)}` : '';
      els.pageDate.textContent = `📅 ${formatDate(page.date, true)}`;
      els.pageSlug.textContent = `#${page.slug}`;
      els.pageContent.innerHTML = page.content;
      
      // FIX: безопасный скролл
      if (els.mainArea && typeof els.mainArea.scrollTop !== 'undefined') {
        els.mainArea.scrollTop = 0;
      }
      
      els.listView.classList.remove('active');
      els.pageView.classList.add('active');
      history.pushState({ slug }, '', `#${slug}`);
      closeSidebar();
    }
    
    function showList() {
      els.pageView.classList.remove('active');
      els.listView.classList.add('active');
      els.headerTitle.textContent = 'Все вопросы';
      els.headerSub.querySelector('span').textContent = pages.length;
      history.pushState({}, '', location.pathname);
      els.searchInput.value = '';
      els.searchResults.classList.remove('show');
    }

    // ===== ПОИСК =====
    els.searchInput?.addEventListener('input', (e) => {
      const query = e.target.value.trim();
      if (query.length < 2) {
        els.searchResults.classList.remove('show');
        renderList(pages);
        els.headerTitle.textContent = 'Все вопросы';
        return;
      }
      const results = fuse.search(query).slice(0, 12);
      const items = results.map(r => r.item);
      
      els.searchResults.innerHTML = items.map(page => `
        <div class="result-item" onclick="openPage('${page.slug}');els.searchResults.classList.remove('show');els.searchInput.blur()">
          <div class="result-title">${page.category ? `<span class="result-category">${escapeHtml(page.category)}</span>` : ''}${highlightMatch(page.title, query)}</div>
          <div class="result-meta">${escapeHtml(page.description)}</div>
        </div>
      `).join('') || '<div class="result-item" style="cursor:default;color:var(--text-muted)">Ничего не найдено</div>';
      
      els.searchResults.classList.add('show');
      els.headerTitle.textContent = `Результаты: ${items.length}`;
    });
    
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) els.searchResults.classList.remove('show');
    });

    // ===== КОПИРОВАНИЕ =====
    async function copyPageContent() {
      const text = els.pageContent?.innerText || '';
      try {
        await navigator.clipboard.writeText(text);
        showToast('Скопировано!');
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast('Скопировано!');
      }
    }
    function showToast(msg) {
      els.toastText.textContent = msg;
      els.copyToast.style.transform = 'translateX(-50%) translateY(0)';
      setTimeout(() => els.copyToast.style.transform = 'translateX(-50%) translateY(100px)', 1800);
    }

    // ===== SIDEBAR / KEYBOARD =====
    function toggleSidebar() { els.sidebar.classList.toggle('open'); els.menuToggle.classList.toggle('active'); }
    function closeSidebar() { els.sidebar.classList.remove('open'); els.menuToggle.classList.remove('active'); }
    function closeSidebarOnOutsideClick(e) {
      if (window.innerWidth <= 900 && els.sidebar.classList.contains('open') && !e.target.closest('.sidebar') && !e.target.closest('.menu-toggle')) closeSidebar();
    }
    
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); els.searchInput?.focus(); els.searchInput?.select(); }
      if (e.key === 'Escape') { els.searchResults.classList.remove('show'); if (els.pageView.classList.contains('active')) showList(); }
    });
    
    window.addEventListener('hashchange', handleRoute);
    function handleRoute() {
      const slug = location.hash.slice(1);
      if (slug && pages.some(p => p.slug === slug)) openPage(slug);
    }

    // ===== УТИЛИТЫ =====
    function escapeHtml(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    function highlightMatch(text, query) { const r = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'); return text.replace(r, '<mark>$1</mark>'); }
    function formatDate(dateStr, full = false) {
      const d = new Date(dateStr);
      return full ? d.toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' }) : d.toLocaleDateString('ru-RU');
    }

    // ===== START =====
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
