name: Update Pages

on:
  push:
    paths:
      - '**/*.md'
  workflow_dispatch:

jobs:
  update-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install @octokit/rest marked

      - name: Generate pages.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node scripts/generate-pages.js

      - name: Commit pages.json
        run: |
          git config user.name 'GitHub Action'
          git config user.email 'action@github.com'
          git add pages.json
          git diff --staged --quiet || git commit -m "chore: update pages.json [skip ci]"
          git push
